name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ARCYN\ARCYN.UI\ARCYN.UI.csproj

      - name: Build
        run: dotnet build ARCYN\ARCYN.UI\ARCYN.UI.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish ARCYN\ARCYN.UI\ARCYN.UI.csproj -c Release --no-build -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARCYN
          path: publish\ARCYN.exe
